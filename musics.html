<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/musics.css">

    <title>Musics</title>
</head>
<body style="position: absolute;">
    <div id="musics">
        <div class="container">
            <div class="album">
                <div class="album-image">
                    <img src="./images/nostalgia.png">
                </div>
                <div class="album-title">
                    <h2 class="date">2021 - Single</h2>
                    <h1>Nostalgia</h1>
                </div>
            </div>
            <div class="songs">
                <div class="box">
                    <div class="name">
                        <h2>Nostalgia</h2>
                    </div>
                    <div class="song-file">
                        <audio controls>
                            <source src="./audio/nostalgia.mp3">
                        </audio>
                    </div>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="album">
                <div class="album-image">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Overo2.jpg/800px-Overo2.jpg">
                </div>
                <div class="album-title">
                    <h2 class="date">2022 - Single</h2>
                    <h1>Lixo</h1>
                </div>
            </div>
            <div class="songs">
                <div class="box">
                    <div class="name">
                        <h2>Lixo</h2>
                    </div>
                    <div class="song-file">
                        <audio controls>
                            <source src="./audio/lixo.mp3">
                        </audio>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
