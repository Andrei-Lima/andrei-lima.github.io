<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/games.css">
    <title>Andrei Lima - Games</title>
</head>
<body>
    <div class="games-app">
        <div class="navbar">
            <div class="title">
                <h1>Meus Jogos</h1>
            </div>
            <div class="search">
                <form id="form">
                    <input type="text" id="input" autocomplete="off" placeholder="Pesquise aqui...">
                </form>
            </div>
        </div>
        <div class="game-list">
            <div class="game-box">
                <div class="game-img">
                    <img src="/images/game-images/controversialrabbiticon.png">
                </div>
                <div class="game-price">
                    <span id="price-text">Free</span>
                </div>
                <div class="game-title">
                    <span><a href="/games/controversialrabbit.html">Controversial Rabbit</a></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
