<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/musics.css">
    <title>Andrei Lima - Músicas</title>
</head>
<body>
    <div class="topbar">
        <a href="/index.html">Página Principal</a>
    </div>

    <div class="box">
        <div class="album-info">
            <div class="image">
                <img src="/images/nostalgia logo.png" alt="" width="200px">
            </div>
            <div class="pstdjs">
                <div class="id">
                    <p>#Ep</p>
                </div>
                <div class="title">
                    <h2>Nostalgia</h2>
                </div>
            </div>
        </div>
        <div class="music-list">
            <div class="music-box">
                <div class="title">
                    <p>Nostalgia</p>
                </div>
                <audio controls>
                    <source src="/musics/Nostalgia/Nostalgia.mp3">
                </audio>
            </div>
            <div class="music-box">
                <div class="title">
                    <p>Catnip</p>
                </div>
                <audio controls>
                    <source src="/musics/Nostalgia/outro.mp3">
                </audio>
            </div>
        </div>
    </div>

    <div class="box">
        <div class="album-info">
            <div class="image">
                <img src="/images/People Logo Img.png" alt="" width="200px">
            </div>
            <div class="pstdjs">
                <div class="id">
                    <p>#Album</p>
                </div>
                <div class="title">
                    <h2>"People" Soundtrack</h2>
                </div>
            </div>
        </div>
        <div class="music-list">
            <div class="music-box">
                <div class="title">
                    <p>Him</p>
                </div>
                <audio controls>
                    <source src="/musics/People/him calm 2.mp3">
                </audio>
            </div>
            <div class="music-box">
                <div class="title">
                    <p>Rekognition</p>
                </div>
                <audio controls>
                    <source src="/musics/People/rekognition.mp3">
                </audio>
            </div>
            <div class="music-box">
                <div class="title">
                    <p>Dialogue</p>
                </div>
                <audio controls>
                    <source src="/musics/People/dialogue.mp3">
                </audio>
            </div>
            <div class="music-box">
                <div class="title">
                    <p>Restaurant</p>
                </div>
                <audio controls>
                    <source src="/musics/People/bar.mp3">
                </audio>
            </div>
            <div class="music-box">
                <div class="title">
                    <p>Who Are You?</p>
                </div>
                <audio controls>
                    <source src="/musics/People/way.mp3">
                </audio>
            </div>
        </div>
    </div>
    <footer>
        <div>Twitter: <a href="https://twitter.com/Fovy9">@Fovy9</a></div>
        <div>Instagram: <a href="https://www.instagram.com/fovy_lima/">@fovy_lima</a></div>
        <div>Youtube: <a href="https://www.youtube.com/channel/UCT-lQnbYpMKoVPWaQXB_DMw/videos">@Fovy</a></div>
    </footer>
</body>
</html>
